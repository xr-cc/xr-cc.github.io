name: Validate Site

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Validate structured data
        run: ruby scripts/validate_data.rb

      - name: Build Jekyll site
        run: bundle exec jekyll build
