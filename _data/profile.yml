about:
  - "I am a Postdoctoral Researcher at the <a href=\"https://dsi.brown.edu/\">Data Science Institute</a> and <a href=\"https://ccmb.brown.edu/\">Center for Computational Molecular Biology</a> at Brown University, working with <a href=\"https://webhelper.brown.edu/ramachandran/\">Sohini Ramachandran</a>. Before that, I received my Ph.D. in Computational and Mathematical Engineering from Stanford University in 2023, where I was supervised by <a href=\"https://rosenberglab.stanford.edu/index.html\">Noah Rosenberg</a>."
  - "My research focuses on method development in population genetics, computational biology, and data science. I use computational techniques such as machine learning, optimization, network analysis, and statistical inference to analyze complex genetic and genomic data."
