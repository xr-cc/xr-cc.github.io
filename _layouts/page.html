---
layout: default
---
<section class="page-hero">
  <div class="shell">
    <p class="eyebrow">{{ page.eyebrow | default: "Academic website" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
      <p class="page-hero__intro">{{ page.intro }}</p>
    {% endif %}
  </div>
</section>

<section class="page-section">
  <div class="shell prose">
    {{ content }}
  </div>
</section>
